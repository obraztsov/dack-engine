# dack.config.yaml — operator control plane (PRD §8.2).
# The non-LLM authority surface. Operator owns it; the harness reads it (hot-reloadable);
# the agent may READ select fields but can NEVER write it.
#
# Copy to dack.config.yaml and fill in real DIDs. Secret *values* never live here —
# only references (file://...) resolved by the secret store.

# The trusted operator DID — provenance check for the `operator_signed` tier (PRD §5.7).
operator_did: "did:key:z6MkOperatorReplaceMe"

# Routing table (MCP2-B): (payload_tier, type) -> priority + coalesce + the transition CEILING.
# The ENTRY state-prompt is the STIMULUS's own `entry:` (a path under prompts/); the soul owns the
# chain from there. `ceiling` is the highest consciousness tier a chain may walk to (default
# express). A `ceiling: settle` is the operator authority that lets a self/operator route reach the
# irreversible Settle (guarded at load to non-public routes); `reflect` is never a ceiling.
routing:
  - match: { tier: public, type: mention }         # twitter-mentions → perceive, then reply
    priority: low
    coalesce: { mode: batch, window_sec: 300, dedup_key: thread_id }
    secrets: [x]                                   # SENSOR/skill secret (not MCP) — operator-gated.
  - match: { tier: public, type: feed_digest }     # twitter-feed → read the room (perceive only)
    priority: low
  - match: { tier: self, type: scheduled_post }    # heartbeat shitpost cadence
    ceiling: express
  - match: { tier: self, type: trade_signal }      # a daily bounded-loss trade duty (SETTLE-B)
    ceiling: settle                                # operator authority: this chain MAY reach Settle

# Entry state-prompt for harness-synthesized stimuli (back-online ping, `dack say`).
default_entry: perceive

# ── MCP tier policy (MCP2-B, invariant I16): the operator's half of the capability handshake. ──
# A state-prompt's `mcp:` request is admitted only here. `import` = operator `mcp_servers` a
# state-prompt at this tier may import by name (token injected server-side, never agent context).
# `mcp_whitelist: false` = an OPEN tier: the soul may ALSO inline any public, secret-less MCP
# (forced read-tier — it can never self-grant post/settle). An unconfigured tier is locked + empty.
tier_policy:
  perceive: { mcp_whitelist: false, import: [cove-read] }   # open: self-plug public reads + cove-read
  express:  { import: [twitter] }                           # locked: only the X post/reply server
  settle:   { import: [cove-trading, cove-read] }           # locked: the irreversible trade server
  reflect:  { import: [] }                                  # locked: no capabilities while self-editing

# Names injected into the agent + sensor env. RECOVERABLE values only (PRD §7.2):
# leak == rotate. The Soul DID key is deliberately absent — it lives in `secrets:`.
forwarded_env: [BANKR_API_KEY, BUILDER_DID_KEY, DACK_HANDLE, RATE_LIMIT]

# Secrets providers — trusted, harness-owned scripts that materialize a short-lived token env
# on demand (fetch + validity-check + rotate-only-when-needed). A duty references one by name
# in its `secrets:` list; the harness runs the script and injects its JSON output into ONLY
# that duty's sensor. Adding a new secret (cove.trade, …) is a new entry here + a script —
# never a harness change. The provider holds the ROOT creds; the sensor only sees the bearer.
secrets_providers:
  - name: x                                    # twitter duties declare `secrets: [x]`
    command: ["python3", "secrets-providers/x_oauth2.py"]
    env:                                       # config (paths/refs), NOT secret values
      X_CREDS_FILE: "agentdack.rw.x.txt"       # gitignored OAuth2 bootstrap creds (RW)
      X_TOKEN_STORE: "agentdack.rw.x.txt.tokens.json"   # rotated tokens (gitignored, 0600)
    keys: [X_BEARER_TOKEN]
  # - name: cove                               # future: cove.trade trading key, same shape
  #   command: ["python3", "secrets-providers/cove.py"]
  #   env: { COVE_KEY_FILE: "cove.key.txt" }
  #   keys: [COVE_API_KEY]

# References only — values live in a separate store the YAML never inlines, so config
# is inspectable without exposing keys. The Soul DID key is harness-only (never forwarded).
secrets:
  soul_did_key: "file:///run/secrets/soul_did_key"

# The Settle predicate reads this (PRD §7.6). v1: empty/zeroed — Settle unwired.
# Amount/cap is enforced by the DAC treasury, NOT duplicated here.
control_plane:
  cap_remaining: 0
  whitelist: []
  allowed_action_types: []

# Cron for the harness-entered Reflect run (PRD §4.2). The ONLY scheduled way in;
# no consciousness state can transition into Reflect. Omit for manual `dack reflect-now`.
reflect_schedule: "0 4 * * *"           # nightly 04:00 — "sleep-with-dreams"

# Where the harness runs (Phase 3). All optional — these are the defaults.
soul_repo: "."                          # the actor bundle on the box (holds stimuli/, SOUL.md, …)
db_path: "dack.sqlite"                  # embedded SQLite queue (ephemeral; losing it loses only the queue)
webhook_addr: "127.0.0.1:8787"          # localhost-only webhook listener (nothing public without a proxy)

# Runtime bridge (Phase 4): the harness spawns `bun run bridge.ts` in this project per
# invocation and drives it over stdio; the wall stays in the Rust responder. The bridge is a
# small TS project that depends on `@gitlawb/openclaude` from npm (run `bun install` there).
bridge_dir: "openclaude-bridge"
# model: leave UNSET for an OpenAI-compatible gateway (opengateway/mimo, Ollama, …) — set the
# model via OPENAI_MODEL in the env instead. `model:` here is only for SDK-catalog (Anthropic)
# models; a gateway name passed as options.model is rejected by the SDK's model catalog.
# model: "claude-haiku-4-5"
# Env var NAMES forwarded into the bridge (values come from the harness env, never the YAML).
# For opengateway: export CLAUDE_CODE_USE_OPENAI=1  OPENAI_API_KEY=ogw_live_…  OPENAI_BASE_URL=https://opengateway.gitlawb.com/v1  OPENAI_MODEL=mimo-v2.5-pro
# CLAUDE_CODE_USE_OPENAI=1 is REQUIRED to use the gateway — without it the SDK falls back to
# ambient Anthropic/Claude auth (verified Phase 6). A reasoning model (mimo) is slow (~30–60s/state).
runtime_env: [OPENAI_API_KEY, OPENAI_BASE_URL, OPENAI_MODEL, CLAUDE_CODE_USE_OPENAI]

# ── Soul repo + identity (Phase 7: durable, signed, off-VPS) ──────────────────────────────
# `gl` identity DIRECTORIES per role (each holds identity.pem + ucan.json). The Soul dir signs
# every soul commit + the `gitlawb://` push, and its key NEVER enters agent env (PRD §3.3, §7.2).
# Create with `gl identity new --dir identities/<role>`; gitignore `/identities/`.
identities:
  soul: "identities/soul"
  operator: "identities/operator"
  builder: "identities/builder"

# The soul's signed push remote. When set (with identities.soul), the harness uses the Gitlawb
# repo-host: each per-run commit-sweep + runlog is committed as the Soul DID and pushed as a
# signed `gitlawb://` ref-update. Omit for plain-git, local-only (degraded mode, PRD §3.5).
# soul_repo above should point at the soul working tree (its own git repo), e.g. "soul-template".
soul_remote: "gitlawb://did:key:z6MkYourSoulDidReplaceMe/dack-soul"
gitlawb_node: "https://node.gitlawb.com"

# Wall-clock budget (seconds) for one consciousness invocation incl. the wall round-trips. A hung
# LLM/bridge elapses here → a logged Runtime error → dispatch continues (never a frozen loop).
invoke_timeout_secs: 300

# ── MCP capability registry (PRD §6.3) ────────────────────────────────────────────────────
# Operator authority — the agent can NEVER add a capability (that would be self-granting). Adding
# a tool (cove.trade, the next MCP) is an entry here + a token file behind a secrets provider —
# NEVER a harness/bridge code change. `tier` is the single source of truth the wall classifies
# from, and gates which state may reach it:
#   read   → ToolClass::Read   → safe in every state (monitoring: balances, prices)
#   post   → ToolClass::Post   → Express only (reversible: tweet/reply)
#   settle → ToolClass::SettleTx → SETTLE only + allow_settle (irreversible: trade/transfer/vote)
# `transport` is `{type: stdio, command, args}` (our own daemon) or `{type: http, url}` (remote).
# `auth.secret` names a secrets provider; the token is injected into the http header / stdio env
# so it reaches the server but NEVER the agent's context. A state-prompt REQUESTS a server in its
# `mcp:` frontmatter; the `tier_policy` above ADMITS it (the two-sided handshake, MCP2-B / I16).
# `tools:` (optional) is a per-server tool ALLOWLIST (bare names). When set, ONLY those tools are
# permitted — the wall denies any other tool under `mcp__<name>__` FAIL-CLOSED. This is essential
# for an endpoint that serves its full surface to every token: cove returns all 37 tools (incl.
# buy_token) on the read-only token, so `cove-read` MUST whitelist only the read tools, with the
# trade tools living on the `cove-trading` (settle) sibling. Empty/omitted = expose everything.
mcp_servers:
  - name: twitter
    transport: { type: stdio, command: bun, args: [run, openclaude-bridge/twitter-mcp.ts] }
    auth: { secret: x, env: X_BEARER_TOKEN }
    tier: post
  - name: cove-read       # remote http MCP — monitoring (read-only token)
    transport: { type: http, url: "https://staging.cove.trade/api/mcp" }   # cove enabled MCP on staging
    auth: { secret: cove_read }     # → Authorization: Bearer <token>; header/scheme overridable
    tier: read
    tools: [get_balance, get_positions, search_tokens, get_token_info, get_token_stats,
            get_price_history, get_token_security_report, scan_trending_tokens, simulate_swap]  # read subset
  - name: cove-trading    # remote http MCP — IRREVERSIBLE trading (read-write token); Settle only
    transport: { type: http, url: "https://staging.cove.trade/api/mcp" }
    auth: { secret: cove_trade }
    tier: settle
    tools: [simulate_swap, buy_token, sell_token, create_limit_buy, cancel_limit_order]  # trade subset
